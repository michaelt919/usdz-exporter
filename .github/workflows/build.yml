name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: usdz-exporter-${{ github.ref_name }}-windows
            asset_path: dist/*.exe
          - os: ubuntu-latest
            artifact_name: usdz-exporter-${{ github.ref_name }}-linux
            asset_path: dist/*
          - os: macos-latest
            artifact_name: usdz-exporter-${{ github.ref_name }}-macos
            asset_path: dist/*

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
        shell: bash

      - name: Build binary
        run: |
          pyinstaller scripts/converter.py --collect-all pxr -y --onefile --name "${{ matrix.artifact_name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist/* -T "${{ github.ref_name }}" -F RELEASE.md
